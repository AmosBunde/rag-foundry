version: "3.9"

name: rag-foundry

x-common-variables: &common-variables
  ENVIRONMENT: ${ENVIRONMENT:-development}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  REDIS_URL: redis://redis:6379/0
  POSTGRES_URL: postgresql+asyncpg://rag:rag@postgres:5432/rag
  QDRANT_URL: http://qdrant:6333
  ELASTICSEARCH_URL: http://elasticsearch:9200
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: ${NEO4J_PASSWORD:-ragfoundry}
  OLLAMA_URL: http://ollama:11434

services:
  # ---------------------------------------------------------------------------
  # Shared data stores
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: rag-postgres
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag}
      POSTGRES_DB: rag
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rag-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: rag-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: rag-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  neo4j:
    image: neo4j:5.19-community
    container_name: rag-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-ragfoundry}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-ragfoundry} 'RETURN 1'"]
      interval: 15s
      timeout: 10s
      retries: 10

  ollama:
    image: ollama/ollama:0.1.38
    container_name: rag-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10

  # ---------------------------------------------------------------------------
  # Placeholder application services
  # ---------------------------------------------------------------------------
  01-hybrid-rag-backend:
    build:
      context: ./01-hybrid-rag/backend
    container_name: hybrid-rag-backend
    environment:
      <<: *common-variables
      APP_NAME: hybrid-rag
      PORT: 8001
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      ollama:
        condition: service_healthy
    profiles:
      - apps

  02-graph-rag-backend:
    build:
      context: ./02-graph-rag/backend
    container_name: graph-rag-backend
    environment:
      <<: *common-variables
      APP_NAME: graph-rag
      PORT: 8002
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      ollama:
        condition: service_healthy
    profiles:
      - apps

  03-agentic-rag-hospital-backend:
    build:
      context: ./03-agentic-rag-hospital/backend
    container_name: agentic-rag-hospital-backend
    environment:
      <<: *common-variables
      APP_NAME: agentic-rag-hospital
      PORT: 8003
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    profiles:
      - apps

  04-corrective-rag-backend:
    build:
      context: ./04-corrective-rag/backend
    container_name: corrective-rag-backend
    environment:
      <<: *common-variables
      APP_NAME: corrective-rag
      PORT: 8004
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      ollama:
        condition: service_healthy
    profiles:
      - apps

  05-multimodal-rag-backend:
    build:
      context: ./05-multimodal-rag/backend
    container_name: multimodal-rag-backend
    environment:
      <<: *common-variables
      APP_NAME: multimodal-rag
      PORT: 8005
    ports:
      - "8005:8005"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    profiles:
      - apps

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  elasticsearch_data:
  neo4j_data:
  neo4j_logs:
  ollama_data:
