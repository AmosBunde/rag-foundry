# Redis-backed sliding window rate limits for Agentic RAG Hospital
limits:
  - name: query
    path: "/api/v1/query/*"
    methods: ["POST"]
    rate: "10/minute"
    per: ip
  - name: ingest
    path: "/api/v1/ingest"
    methods: ["POST"]
    rate: "5/minute"
    per: ip
  - name: auth
    path: "/api/v1/auth/token"
    methods: ["POST"]
    rate: "5/minute"
    per: ip
  - name: global
    path: "*"
    methods: ["*"]
    rate: "100/minute"
    per: ip
