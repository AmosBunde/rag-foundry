# PII detection rules for Agentic RAG Hospital
rules:
  - type: regex
    entity: EMAIL
    pattern: '\\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Z|a-z]{2,}\\b'
    action: block
  - type: regex
    entity: US_SSN
    pattern: '\\b\\d{3}-\\d{2}-\\d{4}\\b'
    action: block
  - type: regex
    entity: CREDIT_CARD
    pattern: '\\b\\d{4}[\\s-]?\\d{4}[\\s-]?\\d{4}[\\s-]?\\d{4}\\b'
    action: block
  - type: regex
    entity: PHONE
    pattern: '\\b\\d{3}-\\d{3}-\\d{4}\\b'
    action: block
  - type: regex
    entity: PATIENT_NAME
    pattern: '\\b(MR|MS|MRS|DR)\\.?\\s+[A-Z][a-z]+\\s+[A-Z][a-z]+\\b'
    action: block

# Optional Presidio entities (loaded when USE_PRESIDIO=true)
presidio_entities:
  - PERSON
  - LOCATION
  - ORGANIZATION
  - CREDIT_CARD
  - US_SSN
  - EMAIL_ADDRESS
  - PHONE_NUMBER
