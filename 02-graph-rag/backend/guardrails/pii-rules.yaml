regex_rules:
  - name: US_SSN
    pattern: "\\b\\d{3}-\\d{2}-\\d{4}\\b"
  - name: CREDIT_CARD
    pattern: "\\b\\d{4}[\\s-]?\\d{4}[\\s-]?\\d{4}[\\s-]?\\d{4}\\b"
  - name: EMAIL
    pattern: "\\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Z|a-z]{2,}\\b"
  - name: PHONE
    pattern: "\\b\\d{3}-\\d{3}-\\d{4}\\b"

presidio_entities:
  - PERSON
  - LOCATION
  - ORGANIZATION
  - EMAIL_ADDRESS
  - PHONE_NUMBER
  - US_PASSPORT
  - US_BANK_NUMBER
  - US_DRIVER_LICENSE
  - US_ITIN
  - US_SSN
  - CREDIT_CARD
  - IP_ADDRESS
  - DATE_TIME

enable_presidio: false
